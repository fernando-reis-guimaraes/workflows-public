name: Manual CapRover Deploy Reusable

on:
  workflow_call:
    inputs:
      caprover_host:
        description: CapRover server host URL
        required: true
        type: string
      caprover_password:
        description: CapRover app token/password
        required: true
        type: string
      app_name:
        description: CapRover app name
        required: true
        type: string
      branch:
        description: Git branch to deploy
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Mask Password
        run: |
          echo "::add-mask::${{ inputs.caprover_password }}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Deploy
        env:
          CAPROVER_HOST: ${{ inputs.caprover_host }}
          CAPROVER_PASSWORD: ${{ inputs.caprover_password }}
          CAPROVER_APP_NAME: ${{ inputs.app_name }}
          CAPROVER_BRANCH: ${{ inputs.branch }}
        run: |
          npx --yes caprover deploy \
            -u "${CAPROVER_HOST}" \
            -p "${CAPROVER_PASSWORD}" \
            -a "${CAPROVER_APP_NAME}" \
            -b "${CAPROVER_BRANCH}"
